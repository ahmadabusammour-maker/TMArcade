<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Arcade | Made Simple By Ahmad Abu Sammour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Smooth, Lag-Free Background Base */
        body {
            margin: 0;
            background-color: #0f172a; /* Deep slate base */
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* GPU-Accelerated Glowing Orbs (Replaces the laggy background animation) */
        .orb {
            position: fixed;
            border-radius: 50%;
            opacity: 0.6;
            z-index: -1;
            animation: float 12s infinite ease-in-out alternate;
            /* Hardware acceleration */
            transform: translateZ(0); 
            will-change: transform;
            pointer-events: none;
        }
        
        /* Swapped laggy 'filter: blur()' for ultra-fast radial gradients */
        .orb-1 { top: -20%; left: -20%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(79,70,229,0.8) 0%, transparent 65%); }
        .orb-2 { bottom: -20%; right: -20%; width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(236,72,153,0.8) 0%, transparent 65%); animation-delay: -4s; }
        .orb-3 { top: 20%; left: 30%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(6,182,212,0.8) 0%, transparent 65%); animation-delay: -8s; animation-duration: 18s; }

        @keyframes float {
            0% { transform: translateY(0) translateX(0) scale(1) translateZ(0); }
            100% { transform: translateY(5vh) translateX(5vw) scale(1.05) translateZ(0); }
        }

        /* Liquid Glass Utilities (Optimized) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            /* Added inner shadow to make it look thicker */
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-color 0.4s ease;
            position: relative;
            overflow: hidden;
            /* Hardware acceleration for smooth hover */
            transform: translateZ(0);
            will-change: transform, box-shadow;
        }

        /* Optimized "Liquid Sweep" Hover Animation using Transform instead of Left */
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg) translateX(-300%) translateZ(0);
            transition: transform 0.7s ease;
            z-index: 10;
            pointer-events: none;
            will-change: transform;
        }

        .glass-card:hover::before {
            transform: skewX(-25deg) translateX(300%) translateZ(0);
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.03) translateZ(0);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px 0 rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
        }

        /* Typography */
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .text-glow {
            text-shadow: 0 0 20px var(--theme-glow, rgba(255,255,255,0.4));
        }

        /* --- New Theme Variables & Custom CSS --- */
        :root {
            --theme-color-1: #ec4899; /* Pink */
            --theme-color-2: #a855f7; /* Purple */
            --theme-glow: rgba(236, 72, 153, 0.4);
        }
        
        .theme-gradient-bg {
            background: linear-gradient(to right, var(--theme-color-1), var(--theme-color-2));
        }
        .theme-gradient-text {
            background: linear-gradient(to right, var(--theme-color-1), var(--theme-color-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .filter-btn.active {
            background: linear-gradient(to right, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            border-color: var(--theme-color-1) !important;
            box-shadow: 0 0 15px var(--theme-glow) !important;
        }
        
        /* Hide scrollbar for filters */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <!-- GPU-Accelerated Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- --- Navigation Bar --- -->
    <nav class="fixed w-full z-50 top-0 px-6 py-4">
        <div class="max-w-7xl mx-auto glass-panel rounded-full px-8 py-3 flex justify-between items-center transition-all duration-300 hover:shadow-[0_0_20px_rgba(255,255,255,0.1)]">
            <div class="flex flex-col group cursor-pointer transition-transform duration-300 hover:scale-105">
                <span class="title-font text-2xl font-bold tracking-tight">TM Arcade</span>
                <span class="text-[0.65rem] uppercase tracking-[0.2em] opacity-80 -mt-1 ml-0.5 group-hover:opacity-100 transition-opacity">Made Simple</span>
            </div>
            
            <!-- Separated Navbar Bubbles -->
            <div class="hidden md:flex items-center space-x-4 mx-auto text-sm font-semibold text-white">
                <a href="#" class="bg-white/10 border border-white/20 px-6 py-2 rounded-full backdrop-blur-md shadow-[0_4px_10px_rgba(0,0,0,0.1)] transition-all duration-300 hover:bg-white/20 hover:scale-110 hover:-translate-y-0.5">Home</a>
                <button onclick="openSettingsModal()" class="bg-white/10 border border-white/20 px-6 py-2 rounded-full backdrop-blur-md shadow-[0_4px_10px_rgba(0,0,0,0.1)] transition-all duration-300 hover:bg-white/20 hover:scale-110 hover:-translate-y-0.5 focus:outline-none">Settings</button>
            </div>

            <div class="hidden md:flex items-center text-sm font-medium opacity-90 text-white bg-white/5 border border-white/10 px-4 py-1.5 rounded-full">
                <span id="playerAvatarDisplay" class="text-xl mr-2 drop-shadow-md">👾</span>
                Welcome, <span id="playerNameDisplay" class="ml-1 font-bold theme-gradient-text">Player</span>!
            </div>
        </div>
    </nav>

    <!-- --- Hero Section --- -->
    <header class="pt-36 pb-12 px-6 text-center z-10 flex-grow-0">
        <h1 class="title-font text-6xl md:text-8xl font-bold mb-2 text-glow tracking-tighter">TM Arcade</h1>
        <p class="text-lg md:text-xl font-light tracking-[0.3em] uppercase opacity-90">Made Simple</p>
        <p class="mt-6 max-w-xl mx-auto text-sm md:text-base opacity-70 font-light leading-relaxed">
            Welcome to the ultimate, clutter-free gaming experience. 
            No confusing menus, no aggressive ads—just pure gameplay wrapped in beautiful glass.
        </p>
    </header>

    <!-- --- Main Content (Search & Game Grid) --- -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-6 pb-24 z-10">
        
        <!-- Search Bar & Add Game -->
        <div class="max-w-4xl mx-auto mb-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="flex-grow w-full glass-panel rounded-full flex items-center px-6 py-3 transition-all duration-300 transform hover:scale-[1.01] hover:bg-white/10 hover:border-white/40 focus-within:bg-white/10 focus-within:border-white/50 focus-within:shadow-[0_0_20px_rgba(255,255,255,0.2)] focus-within:scale-[1.01]">
                <svg class="w-6 h-6 text-white/60 mr-3 transition-transform duration-300 hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input id="searchInput" type="text" placeholder="Search for a game..." class="w-full bg-transparent border-none text-white placeholder-white/50 focus:outline-none py-2 text-lg font-light">
            </div>
            <button onclick="openAddModal()" class="w-full md:w-auto theme-gradient-bg rounded-full px-8 py-3 transition-all duration-300 transform hover:scale-[1.05] shadow-[0_0_15px_var(--theme-glow)] hover:shadow-[0_0_25px_var(--theme-glow)] font-bold tracking-wide flex items-center justify-center whitespace-nowrap text-white border border-white/20">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Add Game
            </button>
        </div>

        <!-- Quick Filters -->
        <div class="max-w-4xl mx-auto mb-10 flex space-x-3 overflow-x-auto pb-2 scrollbar-hide px-2" id="category-filters">
            <button onclick="setFilter('All', this)" class="filter-btn active px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">All Games</button>
            <button onclick="setFilter('Favorites', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white flex items-center border-transparent"><span class="text-red-400 mr-1.5 drop-shadow-[0_0_5px_rgba(248,113,113,0.8)]">♥</span> Favorites</button>
            <button onclick="setFilter('Action', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">Action</button>
            <button onclick="setFilter('Platformer', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">Platformer</button>
            <button onclick="setFilter('Strategy', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">Strategy</button>
            <button onclick="setFilter('Arcade', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">Arcade</button>
            <button onclick="setFilter('Adventure', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">Adventure</button>
            <button onclick="setFilter('Multiplayer', this)" class="filter-btn px-5 py-2 rounded-full glass-panel whitespace-nowrap transition-all font-medium text-sm text-white border-transparent">Multiplayer</button>
        </div>

        <!-- The Games Grid will be injected here by JavaScript -->
        <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Cards are rendered via JS below -->
        </div>
    </main>

    <!-- --- Footer --- -->
    <footer class="glass-panel mt-auto py-6 text-center z-10 border-b-0 border-r-0 border-l-0 rounded-none">
        <p class="text-sm opacity-60 font-light">Made By Ahmad Abu Sammour</p>
    </footer>

    <!-- --- Game Player Modal (Fullscreen) --- -->
    <div id="game-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center bg-black">
        <!-- Floating Close Button -->
        <button onclick="closeGame()" class="absolute top-6 left-6 z-[110] bg-white/10 hover:bg-red-500/80 text-white p-4 rounded-full backdrop-blur-md border border-white/20 transition-all hover:scale-110 shadow-[0_0_20px_rgba(0,0,0,0.5)] group">
            <svg class="w-6 h-6 transform group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <!-- Game Window (Full Screen) -->
        <div class="relative w-full h-full overflow-hidden flex flex-col transform scale-95 transition-transform duration-300" id="modal-content">
            <iframe id="game-iframe" class="absolute inset-0 w-full h-full border-none" src=""></iframe>
        </div>
    </div>

    <!-- --- Add Game Modal --- -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-xl" onclick="closeAddModal()"></div>
        <div class="glass-panel relative w-full max-w-md rounded-[3rem] p-8 transform scale-95 transition-transform duration-300" id="add-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="title-font text-3xl font-bold text-glow">Add a Game</h2>
                <button onclick="closeAddModal()" class="p-2 rounded-full hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6 text-white/60 hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="addGameForm" onsubmit="addGameSubmit(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold opacity-80 mb-2 pl-2">Game Title</label>
                    <input type="text" id="newGameTitle" required placeholder="e.g. Minecraft Classic" class="w-full bg-black/20 border border-white/10 rounded-[1.5rem] px-5 py-3 text-white placeholder-white/30 focus:outline-none focus:border-white/50 focus:bg-white/5 transition-all">

                </div>
                <div>
                    <label class="block text-sm font-semibold opacity-80 mb-2 pl-2">Game Link (URL)</label>

                </div>

                    <button type="submit" class="w-full py-4 rounded-[1.5rem] theme-gradient-bg text-white font-bold text-lg transition-all shadow-[0_0_15px_var(--theme-glow)] hover:shadow-[0_0_25px_var(--theme-glow)] transform hover:scale-[1.02] border border-white/20">Add Game to Arcade</button>

            </form>
        </div>
    </div>

                </button>
            </div>

                    <label class="block text-sm font-semibold opacity-80 mb-2 pl-2">Player Profile</label>
                    <div class="flex gap-3 mb-3 pl-2" id="avatarSelection">

                        <button type="button" onclick="selectAvatar('🎮', this)" class="avatar-btn text-2xl hover:scale-125 transition-all p-2 bg-white/5 rounded-full border border-transparent">🎮</button>
                        <button type="button" onclick="selectAvatar('🚀', this)" class="avatar-btn text-2xl hover:scale-125 transition-all p-2 bg-white/5 rounded-full border border-transparent">🚀</button>
                        <button type="button" onclick="selectAvatar('👻', this)" class="avatar-btn text-2xl hover:scale-125 transition-all p-2 bg-white/5 rounded-full border border-transparent">👻</button>
                        <button type="button" onclick="selectAvatar('👑', this)" class="avatar-btn text-2xl hover:scale-125 transition-all p-2 bg-white/5 rounded-full border border-transparent">👑</button>
                        <button type="button" onclick="selectAvatar('🔥', this)" class="avatar-btn text-2xl hover:scale-125 transition-all p-2 bg-white/5 rounded-full border border-transparent">🔥</button>
                    </div>
                    <input type="text" id="settingsPlayerName" placeholder="Enter your name" class="w-full bg-black/20 border border-white/10 rounded-[1.5rem] px-5 py-3 text-white placeholder-white/30 focus:outline-none focus:border-white/50 focus:bg-white/5 transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold opacity-80 mb-2 pl-2">Accent Theme</label>
                    <div class="flex space-x-3 pl-2" id="themeSelection">
                        <button type="button" onclick="selectTheme('pink', '#ec4899', '#a855f7', this)" class="theme-btn w-10 h-10 rounded-full bg-gradient-to-r from-pink-500 to-purple-500 border-2 border-transparent hover:scale-110 transition-transform shadow-[0_0_10px_rgba(236,72,153,0.5)]"></button>
                        <button type="button" onclick="selectTheme('cyan', '#06b6d4', '#3b82f6', this)" class="theme-btn w-10 h-10 rounded-full bg-gradient-to-r from-cyan-500 to-blue-500 border-2 border-transparent hover:scale-110 transition-transform shadow-[0_0_10px_rgba(6,182,212,0.5)]"></button>
                        <button type="button" onclick="selectTheme('green', '#10b981', '#14b8a6', this)" class="theme-btn w-10 h-10 rounded-full bg-gradient-to-r from-emerald-500 to-teal-500 border-2 border-transparent hover:scale-110 transition-transform shadow-[0_0_10px_rgba(16,185,129,0.5)]"></button>
                        <button type="button" onclick="selectTheme('orange', '#f97316', '#ef4444', this)" class="theme-btn w-10 h-10 rounded-full bg-gradient-to-r from-orange-500 to-red-500 border-2 border-transparent hover:scale-110 transition-transform shadow-[0_0_10px_rgba(249,115,22,0.5)]"></button>
                    </div>
                </div>

                <div class="flex items-center justify-between pl-4 pr-4 bg-black/20 rounded-[1.5rem] border border-white/10 py-4 mt-2">
                    <label class="text-sm font-semibold opacity-90 cursor-pointer" for="settingsOrbsToggle">Show Background Orbs</label>
                    <input type="checkbox" id="settingsOrbsToggle" checked class="w-6 h-6 accent-white cursor-pointer transition-all">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full py-4 rounded-[1.5rem] theme-gradient-bg text-white font-bold text-lg transition-all shadow-[0_0_15px_var(--theme-glow)] hover:shadow-[0_0_25px_var(--theme-glow)] transform hover:scale-[1.02] border border-white/20">Save Settings</button>
                </div>
            </form>
        </div>
    </div>

        ];

        // --- Load Custom Games from Local Storage ---
        const savedCustomGames = JSON.parse(localStorage.getItem('tmArcadeCustomGames')) || [];
        gamesList.push(...savedCustomGames);

        // Sort games alphabetically so sequels and series (like Papa's and FNAF) cluster together!
        gamesList.sort((a, b) => a.title.localeCompare(b.title));

        const gamesGrid = document.getElementById('games-grid');
        const searchInput = document.getElementById('searchInput');

        // State variables
        let currentFilter = 'All';
        let favorites = JSON.parse(localStorage.getItem('tmArcadeFavorites')) || [];

        // Function to toggle favorite status
        function toggleFavorite(title, event) {
            event.stopPropagation(); // Prevents opening the game modal
            
            if (favorites.includes(title)) {
                favorites = favorites.filter(fav => fav !== title);
            } else {
                favorites.push(title);
            }
            localStorage.setItem('tmArcadeFavorites', JSON.stringify(favorites));
            
            // Re-render currently visible games based on active filters
            applyFiltersAndSearch();
        }

        // Function to delete a custom game
        function deleteCustomGame(title, event) {
            event.stopPropagation(); // Prevents opening the game modal
            
            // Remove from main gamesList
            const index = gamesList.findIndex(g => g.title === title && g.genre === 'Custom');
            if (index > -1) {
                gamesList.splice(index, 1);
            }

            // Remove from localStorage
            let customGames = JSON.parse(localStorage.getItem('tmArcadeCustomGames')) || [];
            customGames = customGames.filter(g => g.title !== title);
            localStorage.setItem('tmArcadeCustomGames', JSON.stringify(customGames));

            // Remove from favorites if it was saved there
            if (favorites.includes(title)) {
                favorites = favorites.filter(fav => fav !== title);
                localStorage.setItem('tmArcadeFavorites', JSON.stringify(favorites));
            }

            // Re-render
            applyFiltersAndSearch();
        }

        // Function to generate the HTML for a single game card
        function createGameCard(game) {
            const isFav = favorites.includes(game.title);
            const heartIcon = isFav ? 
                `<svg class="w-6 h-6 text-red-500 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>` : 
                `<svg class="w-6 h-6 text-white/50 hover:text-red-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>`;

            const deleteBtn = game.genre === 'Custom' ? 
                `<div class="absolute top-5 left-5 z-30 bg-black/40 backdrop-blur-md p-2 rounded-full border border-white/10 hover:bg-red-600/90 transition-all hover:scale-110" onclick="deleteCustomGame('${game.title}', event)">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </div>` : '';

            return `
            <div class="glass-card rounded-[3rem] cursor-pointer group" onclick="openGame('${game.url}', '${game.title}')">
                ${deleteBtn}
                <div class="absolute top-5 right-5 z-30 bg-black/40 backdrop-blur-md p-2 rounded-full border border-white/10 hover:bg-black/60 transition-all hover:scale-110" onclick="toggleFavorite('${game.title}', event)">
                    ${heartIcon}
                </div>
                <div class="h-48 w-full bg-black/20 rounded-t-[3rem] relative flex items-center justify-center overflow-hidden" style="background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=800&auto=format&fit=crop'); background-size: cover; background-position: center;">
                    <!-- Dark overlay to make the photo fit the dark theme and help the play button pop -->
                    <div class="absolute inset-0 bg-slate-900/60 z-0 group-hover:bg-slate-900/40 transition-colors duration-300"></div>
                    
                    <div class="absolute inset-0 flex items-center justify-center z-20 opacity-0 group-hover:opacity-100 scale-50 group-hover:scale-100 transition-all duration-300 ease-out">
                        <div class="bg-white/20 backdrop-blur-md rounded-full p-4 border border-white/30 shadow-[0_0_30px_rgba(255,255,255,0.3)] hover:bg-white/30 hover:scale-110 transition-all duration-300">
                            <svg class="w-10 h-10 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity z-10"></div>
                </div>
                <div class="p-6 relative z-20">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="title-font text-xl font-bold transition-colors duration-300 group-hover:text-${game.color}-300">${game.title}</h3>
                        <span class="text-xs py-1 px-3 rounded-full bg-white/10 border border-white/10 transition-colors duration-300 group-hover:bg-white/20">${game.genre}</span>
                    </div>
                    <p class="text-sm opacity-60 line-clamp-2 transition-opacity duration-300 group-hover:opacity-90">${game.desc}</p>
                </div>
            </div>`;
        }

        // Render games to the grid
        function renderGames(gamesToRender) {
            if (gamesToRender.length === 0) {
                gamesGrid.innerHTML = `<div class="col-span-full text-center py-12 opacity-50 font-light text-xl">No games found matching your search or filter.</div>`;
            } else {
                gamesGrid.innerHTML = gamesToRender.map(createGameCard).join('');
            }
        }

        // Apply Filters and Search combined
        function applyFiltersAndSearch() {
            const searchTerm = searchInput.value.toLowerCase();
            
            const filteredGames = gamesList.filter(game => {
                // Check Search
                const matchesSearch = game.title.toLowerCase().includes(searchTerm) || game.genre.toLowerCase().includes(searchTerm);
                
                // Check Category Filter
                let matchesFilter = true;
                if (currentFilter === 'Favorites') {
                    matchesFilter = favorites.includes(game.title);
                } else if (currentFilter !== 'All') {
                    matchesFilter = game.genre === currentFilter;
                }

                return matchesSearch && matchesFilter;
            });

            renderGames(filteredGames);
        }

        // Set Category Filter from buttons
        function setFilter(filterName, btnElement) {
            currentFilter = filterName;
            
            // Reset all buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.style.borderColor = 'transparent';
                btn.style.boxShadow = 'none';
                btn.style.background = 'rgba(255, 255, 255, 0.03)'; // Back to standard glass-panel
            });
            
            // Activate clicked button
            if (btnElement) {
                btnElement.classList.add('active');
                // Theme will be handled by CSS class .active which grabs root variables
            }

            applyFiltersAndSearch();
        }

        // Handle Live Search
        searchInput.addEventListener('input', applyFiltersAndSearch);

        // Initialize grid on load
        applyFiltersAndSearch();

        // --- Add Game Logic ---
        const addModal = document.getElementById('add-modal');
        const addModalContent = document.getElementById('add-modal-content');
        const addGameForm = document.getElementById('addGameForm');

        function openAddModal() {
            addModal.classList.remove('hidden');
            setTimeout(() => {
                addModal.classList.remove('opacity-0');
                addModalContent.classList.remove('scale-95');
                addModalContent.classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeAddModal() {
            addModal.classList.add('opacity-0');
            addModalContent.classList.remove('scale-100');
            addModalContent.classList.add('scale-95');
            setTimeout(() => {
                addModal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        function addGameSubmit(event) {
            event.preventDefault();
            
            const title = document.getElementById('newGameTitle').value;
            const desc = document.getElementById('newGameDesc').value;
            const url = document.getElementById('newGameUrl').value;
            
            // Randomly pick a glow color for the new game
            const colors = ["pink", "cyan", "purple", "indigo"];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            const newGame = {
                title: title,
                genre: "Custom",
                color: randomColor,
                url: url,
                desc: desc
            };

            // Add to the main list
            gamesList.push(newGame);

            // Save to localStorage so it persists across refreshes
            const customGames = JSON.parse(localStorage.getItem('tmArcadeCustomGames')) || [];
            customGames.push(newGame);
            localStorage.setItem('tmArcadeCustomGames', JSON.stringify(customGames));

            // Re-sort so the new game is alphabetized into the right spot
            gamesList.sort((a, b) => a.title.localeCompare(b.title));
            
            // Clear search and re-render
            searchInput.value = '';
            applyFiltersAndSearch();
            
            // Close modal and reset form
            closeAddModal();
            addGameForm.reset();
        }

        // --- Modal Logic ---
        const modal = document.getElementById('game-modal');
        const modalContent = document.getElementById('modal-content');
        const gameIframe = document.getElementById('game-iframe');
        const modalTitle = document.getElementById('modal-title');

        function openGame(url, title) {
            gameIframe.src = url;
            
            // Show modal with animation
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity/scale
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
            
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeGame() {
            // Animate out
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                gameIframe.src = ""; // Unload game memory and stop audio
                document.body.style.overflow = 'auto'; // Restore scrolling
            }, 300); // Matches the CSS transition duration
        }

        // --- Settings Logic ---
        const settingsModal = document.getElementById('settings-modal');
        const settingsModalContent = document.getElementById('settings-modal-content');
        const playerNameDisplay = document.getElementById('playerNameDisplay');
        const playerAvatarDisplay = document.getElementById('playerAvatarDisplay');
        const settingsPlayerNameInput = document.getElementById('settingsPlayerName');
        const settingsOrbsToggle = document.getElementById('settingsOrbsToggle');
        
        let currentPlayerName = localStorage.getItem('tmArcadePlayerName') || "Player";
        let showOrbs = localStorage.getItem('tmArcadeShowOrbs') !== 'false'; // default true
        let currentAvatar = localStorage.getItem('tmArcadeAvatar') || "👾";
        
        // Theme State
        let themeSettings = JSON.parse(localStorage.getItem('tmArcadeTheme')) || {
            name: 'pink', color1: '#ec4899', color2: '#a855f7'
        };
        let tempAvatar = currentAvatar;
        let tempTheme = { ...themeSettings };

        // Initialize UI with saved settings
        playerNameDisplay.textContent = currentPlayerName;
        playerAvatarDisplay.textContent = currentAvatar;
        updateOrbsVisibility();
        applyThemeStyles(themeSettings.color1, themeSettings.color2);

        function openSettingsModal() {
            settingsPlayerNameInput.value = currentPlayerName;
            settingsOrbsToggle.checked = showOrbs;
            tempAvatar = currentAvatar;
            tempTheme = { ...themeSettings };
            
            updateAvatarSelectionUI();
            updateThemeSelectionUI();
            
            settingsModal.classList.remove('hidden');
            setTimeout(() => {
                settingsModal.classList.remove('opacity-0');
                settingsModalContent.classList.remove('scale-95');
                settingsModalContent.classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeSettingsModal() {
            settingsModal.classList.add('opacity-0');
            settingsModalContent.classList.remove('scale-100');
            settingsModalContent.classList.add('scale-95');
            setTimeout(() => {
                settingsModal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        function selectAvatar(emoji, btnElement) {
            tempAvatar = emoji;
            updateAvatarSelectionUI();
        }

        function updateAvatarSelectionUI() {
            document.querySelectorAll('.avatar-btn').forEach(btn => {
                if (btn.textContent.trim() === tempAvatar) {
                    btn.classList.add('border-white', 'bg-white/20');
                    btn.classList.remove('border-transparent', 'bg-white/5');
                } else {
                    btn.classList.remove('border-white', 'bg-white/20');
                    btn.classList.add('border-transparent', 'bg-white/5');
                }
            });
        }

        function selectTheme(name, color1, color2, btnElement) {
            tempTheme = { name, color1, color2 };
            updateThemeSelectionUI();
        }

        function updateThemeSelectionUI() {
            const btns = document.querySelectorAll('.theme-btn');
            btns.forEach(btn => {
                btn.classList.remove('border-white', 'scale-110');
                btn.classList.add('border-transparent');
            });
            // Match the selected theme button
            btns.forEach(btn => {
                if(btn.getAttribute('onclick').includes(tempTheme.name)) {
                    btn.classList.add('border-white', 'scale-110');
                    btn.classList.remove('border-transparent');
                }
            });
        }

        function applyThemeStyles(c1, c2) {
            document.documentElement.style.setProperty('--theme-color-1', c1);
            document.documentElement.style.setProperty('--theme-color-2', c2);
            // Create a semi-transparent glow version of color1 (basic hex to rgba approximation)
            document.documentElement.style.setProperty('--theme-glow', c1 + '66'); // Appends 40% opacity in hex
        }

        function saveSettings(event) {
            event.preventDefault();
            
            // Update name & avatar
            const newName = settingsPlayerNameInput.value.trim();
            if (newName) {
                currentPlayerName = newName;
                playerNameDisplay.textContent = currentPlayerName;
                localStorage.setItem('tmArcadePlayerName', currentPlayerName);
            }
            
            currentAvatar = tempAvatar;
            playerAvatarDisplay.textContent = currentAvatar;
            localStorage.setItem('tmArcadeAvatar', currentAvatar);

            // Update Theme
            themeSettings = { ...tempTheme };
            localStorage.setItem('tmArcadeTheme', JSON.stringify(themeSettings));
            applyThemeStyles(themeSettings.color1, themeSettings.color2);

            // Update orbs
            showOrbs = settingsOrbsToggle.checked;
            localStorage.setItem('tmArcadeShowOrbs', showOrbs);
            updateOrbsVisibility();

            closeSettingsModal();
        }

        function updateOrbsVisibility() {
            const orbs = document.querySelectorAll('.orb');
            orbs.forEach(orb => {
                orb.style.display = showOrbs ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
